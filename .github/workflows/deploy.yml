name: Deploy Cloud Gallery to AWS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # ── Job 1: Validar ────────────────────────────────────────────────────────
  lint-and-test:
    name: 🔍 Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Verificar que index.html existe
        run: |
          if [ ! -f "index.html" ]; then
            echo "❌ index.html no encontrado"
            exit 1
          fi
          echo "✅ index.html encontrado ($(wc -c < index.html) bytes)"

  # ── Job 2: Subir assets a S3 ──────────────────────────────────────────────
  deploy-s3:
    name: 📦 Upload assets to S3
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Subir index.html a S3
        run: |
          aws s3 cp index.html s3://${{ secrets.S3_BUCKET }}/index.html \
            --content-type "text/html" \
            --cache-control "no-cache"
          echo "✅ index.html subido a S3"

  # ── Job 3: Desplegar en EC2 ───────────────────────────────────────────────
  deploy-ec2:
    name: 🚀 Deploy to EC2
    runs-on: ubuntu-latest
    needs: deploy-s3
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/cloud-gallery-key.pem
          chmod 600 ~/.ssh/cloud-gallery-key.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Copiar index.html al EC2 via SCP
        run: |
          scp -i ~/.ssh/cloud-gallery-key.pem \
            index.html \
            ubuntu@${{ secrets.EC2_HOST }}:/tmp/index.html

      - name: Instalar Nginx y desplegar en EC2
        run: |
          ssh -i ~/.ssh/cloud-gallery-key.pem ubuntu@${{ secrets.EC2_HOST }} << 'SSHEOF'
            if ! command -v nginx &> /dev/null; then
              sudo apt-get update -y
              sudo apt-get install -y nginx
              sudo systemctl enable nginx
            fi
            sudo mkdir -p /var/www/cloud-gallery
            sudo mv /tmp/index.html /var/www/cloud-gallery/index.html
            sudo tee /etc/nginx/sites-available/cloud-gallery > /dev/null << 'NGINX'
          server {
              listen 80;
              server_name _;
              root /var/www/cloud-gallery;
              index index.html;
              location / {
                  try_files $uri $uri/ =404;
              }
          }
          NGINX
            sudo ln -sf /etc/nginx/sites-available/cloud-gallery /etc/nginx/sites-enabled/
            sudo rm -f /etc/nginx/sites-enabled/default
            sudo systemctl restart nginx
            echo "✅ Deploy completado!"
          SSHEOF

      - name: Verificar que el servidor responde
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.EC2_HOST }})
          if [ "$STATUS" = "200" ]; then
            echo "✅ Servidor respondiendo correctamente (HTTP $STATUS)"
            echo "🌐 URL: http://${{ secrets.EC2_HOST }}"
          else
            echo "⚠️ Servidor respondió con HTTP $STATUS"
            exit 1
          fi
