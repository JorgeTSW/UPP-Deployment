name: Deploy Cloud Gallery to AWS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # ── Job 1: Validar ────────────────────────────────────────────────────────
  lint-and-test:
    name: 🔍 Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Verificar archivos necesarios
        run: |
          for f in index.html login.html auth.js server.js package.json; do
            if [ ! -f "$f" ]; then echo "❌ $f no encontrado"; exit 1; fi
            echo "✅ $f encontrado"
          done

  # ── Job 2: Subir assets a S3 ──────────────────────────────────────────────
  deploy-s3:
    name: 📦 Upload assets to S3
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Subir assets a S3
        run: |
          aws s3 cp index.html s3://${{ secrets.S3_BUCKET }}/index.html --content-type "text/html" --cache-control "no-cache"
          aws s3 cp login.html s3://${{ secrets.S3_BUCKET }}/login.html --content-type "text/html" --cache-control "no-cache"
          aws s3 cp auth.js s3://${{ secrets.S3_BUCKET }}/auth.js --content-type "application/javascript"
          echo "✅ Assets subidos a S3"

  # ── Job 3: Desplegar en EC2 ───────────────────────────────────────────────
  deploy-ec2:
    name: 🚀 Deploy to EC2
    runs-on: ubuntu-latest
    needs: deploy-s3
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/cloud-gallery-key.pem
          chmod 600 ~/.ssh/cloud-gallery-key.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Copiar archivos al EC2 via SCP
        run: |
          scp -i ~/.ssh/cloud-gallery-key.pem \
            index.html login.html auth.js server.js package.json \
            ubuntu@${{ secrets.EC2_HOST }}:/tmp/

      - name: Instalar dependencias y desplegar
        run: |
          ssh -i ~/.ssh/cloud-gallery-key.pem ubuntu@${{ secrets.EC2_HOST }} << 'SSHEOF'
            # Instalar Node.js si no está
            if ! command -v node &> /dev/null; then
              curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
              sudo apt-get install -y nodejs
              echo "✅ Node.js $(node -v) instalado"
            fi

            # Instalar nginx si no está
            if ! command -v nginx &> /dev/null; then
              sudo apt-get update -y && sudo apt-get install -y nginx
              sudo systemctl enable nginx
            fi

            # Configurar directorio de la app
            sudo mkdir -p /var/www/cloud-gallery/public
            sudo cp /tmp/index.html /tmp/login.html /tmp/auth.js /var/www/cloud-gallery/public/
            sudo cp /tmp/server.js /tmp/package.json /var/www/cloud-gallery/

            # Instalar dependencias de Node
            cd /var/www/cloud-gallery && sudo npm install --production

            # Configurar variables de entorno
            sudo tee /var/www/cloud-gallery/.env > /dev/null << 'ENV'
          S3_BUCKET=${{ secrets.S3_BUCKET }}
          AWS_REGION=${{ secrets.AWS_REGION }}
          ENV

            # Instalar PM2 para mantener el servidor corriendo
            sudo npm install -g pm2 2>/dev/null || true

            # Reiniciar la app con PM2
            cd /var/www/cloud-gallery
            sudo S3_BUCKET=${{ secrets.S3_BUCKET }} AWS_REGION=${{ secrets.AWS_REGION }} \
              pm2 restart cloud-gallery 2>/dev/null || \
              sudo S3_BUCKET=${{ secrets.S3_BUCKET }} AWS_REGION=${{ secrets.AWS_REGION }} \
              pm2 start server.js --name cloud-gallery
            sudo pm2 save

            # Configurar Nginx como reverse proxy
            sudo tee /etc/nginx/sites-available/cloud-gallery > /dev/null << 'NGINX'
          server {
              listen 80;
              server_name _;
              location / {
                  proxy_pass http://localhost:3000;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  client_max_body_size 20M;
              }
          }
          NGINX

            sudo ln -sf /etc/nginx/sites-available/cloud-gallery /etc/nginx/sites-enabled/
            sudo rm -f /etc/nginx/sites-enabled/default
            sudo systemctl restart nginx
            echo "✅ Deploy completado!"
          SSHEOF

      - name: Verificar que el servidor responde
        run: |
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 http://${{ secrets.EC2_HOST }})
          echo "HTTP Status: $STATUS"
          echo "🌐 App disponible en: http://${{ vars.EC2_HOST_PUBLIC }}"
